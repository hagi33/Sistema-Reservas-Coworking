services:
  postgres:
    image: postgres:16-alpine
    container_name: coworking-postgres
    environment:
      POSTGRES_DB: coworking_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:  pg_isready -U admin -d cowroking_db
      interval: 5s
      timeout: 5s
      retries: 5


  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: coworking-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: coworking
      RABBITMQ_DEFAULT_PASS: coworking-secret
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test:  rabbitmqctl status
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
  rabbitmq_data: